baseURL = "https://pendidikan360.my/"
languageCode = "ms-MY"
title = "Pendidikan360"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  env = "production"
  title = "Pendidikan360"
  description = "Sumber rujukan pendidikan Malaysia untuk guru, pensyarah dan pendidik merangkumi Pembelajaran Bermakna, Pentaksiran, Pembelajaran Digital, Teknologi Pendidikan dan AI dalam Pendidikan."
  author = "Pendidikan360"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  images = ["logo.png"]



[params.profileMode]
  enabled = true
  title = "Pendidikan360"
  subtitle = "Sumber rujukan pendidikan Malaysia untuk guru, pensyarah dan pendidik — merangkumi Pembelajaran Bermakna, Pentaksiran, Teknologi Pendidikan dan AI dalam Pendidikan."
  imageUrl = "logo.png"
  imageWidth = 160
  imageHeight = 160
  imageTitle = "Pendidikan360"

  [[params.profileMode.buttons]]
    name = "📚 KPPB"
    url = "/categories/kppb/"

  [[params.profileMode.buttons]]
    name = "📝 Pentaksiran"
    url = "/categories/pentaksiran/"

  [[params.profileMode.buttons]]
    name = "💻 Teknologi Pendidikan"
    url = "/categories/teknologi-pendidikan/"

  [[params.profileMode.buttons]]
    name = "🤖 AI Pendidikan"
    url = "/categories/ai-pendidikan/"

[[params.socialIcons]]
  name = "email"
  url = "mailto:admin@pendidikan360.my"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    identifier = "kppb"
    name = "Pembelajaran Bermakna"
    url = "/categories/kppb/"
    weight = 10

  [[menu.main]]
    identifier = "pentaksiran"
    name = "Pentaksiran"
    url = "/categories/pentaksiran/"
    weight = 20

  [[menu.main]]
    identifier = "teknologi"
    name = "Teknologi Pendidikan"
    url = "/categories/teknologi-pendidikan/"
    weight = 30

  [[menu.main]]
    identifier = "ai"
    name = "AI Pendidikan"
    url = "/categories/ai-pendidikan/"
    weight = 40

  [[menu.main]]
    identifier = "pedagogi"
    name = "Pedagogi"
    url = "/categories/pedagogi/"
    weight = 50

  [[menu.main]]
    identifier = "search"
    name = "Cari"
    url = "/search/"
    weight = 99

[outputs]
  home = ["HTML", "RSS", "JSON"]